<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gilded Page - Premium Books</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* --- Premium Color Palette --- */
        :root {
            --primary-color: #8B4513; /* SaddleBrown for warmth */
            --secondary-color: #2F4F4F; /* DarkSlateGray for contrast */
            --accent-color: #DAA520; /* Goldenrod for a touch of luxury */
            --background-color: #FDF5E6; /* OldLace for a soft, creamy background */
            --text-color: #333;
            --card-background: #fff;
            --shadow-color: rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'Open Sans', sans-serif; /* Modern, readable font */
            margin: 0;
            padding: 0;
            background-color: var(--background-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        .container {
            width: 90%;
            max-width: 1200px; /* Max width for larger screens */
            margin: 0 auto;
            padding: 0 15px;
            overflow: hidden;
        }

        header {
            background: linear-gradient(to right, var(--primary-color), var(--accent-color)); /* Gradient for a richer feel */
            color: #fff;
            padding: 40px 0;
            text-align: center;
            box-shadow: 0 4px 10px var(--shadow-color);
        }

        header h1 {
            margin: 0;
            font-family: 'Playfair Display', serif; /* Elegant serif for headings */
            font-size: 3em; /* Larger, more impactful title */
            letter-spacing: 2px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.2em;
            margin-top: 10px;
            font-style: italic;
        }

        .book-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); /* Slightly wider cards */
            gap: 30px; /* More spacing between cards */
            padding: 40px 0;
        }

        .book {
            background: var(--card-background);
            padding: 30px;
            border-radius: 8px; /* Softer, rounded corners */
            box-shadow: 0 6px 15px var(--shadow-color); /* Deeper shadow */
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease; /* Smooth transition for hover */
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Pushes button to bottom */
        }

        .book:hover {
            transform: translateY(-5px); /* Slight lift on hover */
            box-shadow: 0 10px 25px var(--shadow-color); /* More pronounced shadow on hover */
        }

        .book img {
            max-width: 100%;
            height: 250px; /* Adjusted height for better visual */
            object-fit: cover;
            margin-bottom: 20px;
            border-radius: 5px;
            border: 1px solid #eee; /* Subtle border */
        }

        .book h3 {
            font-family: 'Playfair Display', serif; /* Elegant font for book titles */
            margin-top: 0;
            color: var(--secondary-color);
            font-size: 1.5em;
            margin-bottom: 5px;
        }

        .book p.author { /* Style for author name */
            font-size: 0.95em;
            color: #666;
            margin-bottom: 15px;
        }

        .book .price {
            font-weight: bold;
            color: var(--accent-color);
            font-size: 1.3em;
            margin-bottom: 25px;
            display: block; /* Ensures it takes its own line */
        }

        .book button {
            background: var(--accent-color);
            color: #fff;
            border: none;
            padding: 12px 25px; /* Slightly larger button */
            cursor: pointer;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: 600;
            transition: background-color 0.3s ease, transform 0.2s ease;
            margin-top: auto; /* Pushes button to the bottom of the card */
        }

        .book button:hover {
            background: var(--primary-color); /* Darker on hover */
            transform: scale(1.05); /* Slight grow effect */
        }

        footer {
            text-align: center;
            padding: 30px 0;
            margin-top: 40px;
            color: #fff;
            background-color: var(--secondary-color);
            font-size: 0.9em;
            box-shadow: 0 -4px 10px var(--shadow-color);
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>The Gilded Page</h1>
            <p>Discover stories that enrich your world.</p>
        </div>
    </header>

    <div class="container">
        <section class="book-list">
            <!-- Example Book 1 -->
            <div class="book">
                <img src="https://via.placeholder.com/300x250/8B4513/FFFFFF?text=The+Secret+Garden" alt="Book Cover: The Secret Garden">
                <h3>The Secret Garden</h3>
                <p class="author">Frances Hodgson Burnett</p>
                <div class="price">₹450</div>
                <button>Add to Cart</button>
            </div>

            <!-- Example Book 2 -->
            <div class="book">
                <img src="https://via.placeholder.com/300x250/2F4F4F/FFFFFF?text=Pride+and+Prejudice" alt="Book Cover: Pride and Prejudice">
                <h3>Pride and Prejudice</h3>
                <p class="author">Jane Austen</p>
                <div class="price">₹500</div>
                <button>Add to Cart</button>
            </div>

            <!-- Example Book 3 -->
            <div class="book">
                <img src="https://via.placeholder.com/300x250/DAA520/FFFFFF?text=Moby+Dick" alt="Book Cover: Moby Dick">
                <h3>Moby Dick</h3>
                <p class="author">Herman Melville</p>
                <div class="price">₹550</div>
                <button>Add to Cart</button>
            </div>

            <!-- Example Book 4 -->
            <div class="book">
                <img src="https://via.placeholder.com/300x250/8B4513/FFFFFF?text=The+Odyssey" alt="Book Cover: The Odyssey">
                <h3>The Odyssey</h3>
                <p class="author">Homer</p>
                <div class="price">₹480</div>
                <button>Add to Cart</button>
            </div>

            <!-- Add more book divs here -->
        </section>
    </div>

    <footer>
        <p>&copy; 2023 The Gilded Page. All rights reserved. Crafted with passion.</p>
    </footer>
</body>
</html>
